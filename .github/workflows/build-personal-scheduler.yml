---
name: Trigger cozzite-personal build

on:
  workflow_run:
    workflows:
      - Build container images
    types:
      - completed
  workflow_dispatch:

jobs:
  trigger:
    name: Dispatch cozzite-personal workflow
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event != 'pull_request' &&
        github.event.workflow_run.head_branch == github.event.repository.default_branch
      )
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: read

    steps:
      - name: Resolve workflow ID
        id: resolve_workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WORKFLOW_ID=$(
            curl --fail-with-body -sS \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows" \
            | jq -r '.workflows[] | select(.path == ".github/workflows/build-personal.yml") | .id'
          )

          if [[ -z "${WORKFLOW_ID}" || "${WORKFLOW_ID}" == "null" ]]; then
            echo "Unable to find .github/workflows/build-personal.yml."
            exit 1
          fi

          echo "workflow_id=${WORKFLOW_ID}" >> "${GITHUB_OUTPUT}"

      - name: Trigger build-personal workflow on cozzite-personal
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_ID: ${{ steps.resolve_workflow.outputs.workflow_id }}
        run: |
          curl --fail-with-body -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/${WORKFLOW_ID}/dispatches" \
            --data '{"ref":"cozzite-personal"}'
